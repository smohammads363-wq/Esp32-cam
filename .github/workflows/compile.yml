name: Compile ESP32-CAM Binary

on:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Platform
        run: |
          arduino-cli core update-index
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Prepare Sketch Folder and Compile
        run: |
          mkdir esp32cam_audio_receiver
          mv esp32cam_audio_receiver.ino esp32cam_audio_receiver/
          arduino-cli compile --fqbn esp32:esp32:esp32cam --output-dir ./build ./esp32cam_audio_receiver

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32cam-audio-binary
          path: ./build/
